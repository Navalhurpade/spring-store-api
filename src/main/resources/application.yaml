kind: Application
spring:
  application:
    name: store
  jpa:
    show-sql: true
  jwt:
    secret: ${SECRET}
    accessTokenExpiration: 300      # 5m
    refreshTokenExpiration: 648000  # 7d
  profiles:
    active: dev
server:
