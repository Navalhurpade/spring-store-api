#    key-alias: springboot
#    key-store-password: password
  error:
    include-message: always
razorpay:
  api-key: ${RAZORPAY_API_KEY}
  api-secret: ${RAZORPAY_API_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}